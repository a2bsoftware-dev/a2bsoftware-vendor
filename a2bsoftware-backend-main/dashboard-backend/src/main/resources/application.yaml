spring:
  config:
    import: optional:application-local.yaml
  application:
    name: dashboard-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:a2b_dashboard}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    # Required: set via env var, or add spring.datasource.password to a gitignored application-local.yaml
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri is only used to validate the token's iss claim (must be the
          # browser-facing URL). jwk-set-uri is the actual key-fetch address, which
          # must be reachable from inside this container (differs on Docker, where
          # "localhost" would otherwise resolve to the backend container itself).
          issuer-uri: ${app.keycloak.public-url}/realms/${app.keycloak.realm}
          jwk-set-uri: ${app.keycloak.internal-url}/realms/${app.keycloak.realm}/protocol/openid-connect/certs
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:dashboard-tool}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/auth/callback"
            scope: openid, profile, email
        provider:
          keycloak:
            # Explicit endpoints (rather than a single issuer-uri) avoid Spring
            # doing its own OIDC discovery round-trip at startup, which would
            # otherwise require one single hostname reachable both from the
            # browser and from inside this container.
            authorization-uri: ${app.keycloak.public-url}/realms/${app.keycloak.realm}/protocol/openid-connect/auth
            token-uri: ${app.keycloak.internal-url}/realms/${app.keycloak.realm}/protocol/openid-connect/token
            user-info-uri: ${app.keycloak.internal-url}/realms/${app.keycloak.realm}/protocol/openid-connect/userinfo
            jwk-set-uri: ${app.keycloak.internal-url}/realms/${app.keycloak.realm}/protocol/openid-connect/certs
            user-name-attribute: preferred_username

server:
  port: ${SERVER_PORT:8081}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  # Branding upload storage - local disk inside the container, same durability as the
  # previous Next.js public/uploads approach (lost on rebuild unless a volume is mounted).
  upload-dir: ${UPLOAD_DIR:uploads}
  keycloak:
    realm: a2b-software
    # Browser-facing URL (used for the authorization redirect and iss validation).
    public-url: ${KEYCLOAK_PUBLIC_URL:https://a2b-keycloak.onrender.com}
    # Address reachable from this container itself (token exchange, JWKS, userinfo).
    # Hosted Keycloak is a single public HTTPS address, so this matches public-url.
    internal-url: ${KEYCLOAK_INTERNAL_URL:https://a2b-keycloak.onrender.com}
  auth:
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
    post-login-redirect: ${POST_LOGIN_REDIRECT_PATH:/dashboard}
    post-logout-redirect: ${POST_LOGOUT_REDIRECT_PATH:/login}
    cookie-secure: ${COOKIE_SECURE:false}

# Required: set via env var, or add zamplia.api-key to a gitignored application-local.yaml
zamplia:
  base-url: https://surveysupply.zamplia.com
  api-key: ${ZAMPLIA_API_KEY:}

logging:
  level:
    root: INFO
    com.A2B.dashboardbackend: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
