# Runs just the frontend:
#
#   docker compose up --build
#
# The database, Keycloak, and the backend API all live in the sibling
# ../a2bsoftware-backend repo's own docker-compose.yml - start that stack
# first (it publishes MySQL on host port 3307 and the API on 8081), then
# start this one.
#
# Service:
#   frontend - Next.js app (this is the vendor portal) on
#   http://localhost:4000 - container listens on 4000 internally too (PORT
#   below overrides the Dockerfile's ENV PORT=3000 default), so host and
#   container ports always match 1:1 and can't silently drift apart. Chosen
#   to avoid colliding with a2bsoftware-frontend (3000) or a2bsoftware-client
#   (5000) when all three run at once.
#
# Overridable via a .env file next to this compose file or shell env:
#   NEXT_PUBLIC_API_BASE_URL

services:
  frontend:
    build:
      context: .
      args:
        # Baked into the client bundle at build time - the browser calls the
        # backend directly, so this must be an address reachable from the
        # user's browser, not just from inside the Docker network.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8081}
        # Baked into the routes manifest at build time (next.config.ts's
        # /api/:path* rewrite destination) - a runtime `environment:` value
        # arrives too late, since standalone output resolves rewrites() once,
        # during `next build`, not at container start. This repo's compose
        # project isn't on the same Docker network as a2bsoftware-backend's,
        # so it reaches it via host.docker.internal (see extra_hosts below)
        # rather than a service name.
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://host.docker.internal:8081}
    environment:
      PORT: "4000"
    env_file:
      - ./.env
    extra_hosts:
      # host.docker.internal is automatic on Docker Desktop (Mac/Windows);
      # this makes it resolve on Linux too - needed for any server-side call
      # from inside this container back to the backend stack on the host.
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"
