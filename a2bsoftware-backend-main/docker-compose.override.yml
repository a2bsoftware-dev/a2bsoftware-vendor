# Local dev overrides, auto-merged by `docker-compose up`/`docker-compose up -d`
# alongside docker-compose.yml. Bind-mounts source into each container and runs
# the framework's own dev server, so editing a file + a quick incremental
# rebuild (see notes below) is enough - no more full `docker-compose build`.
services:
  backend:
    build:
      # Stop at the JDK stage (has mvnw + resolved dependencies cached in
      # /root/.m2) instead of the slim JRE runtime image `docker-compose.yml` uses.
      target: build
    volumes:
      - ./dashboard-backend:/app
      # Named volume so the resolved dependency cache survives container
      # recreation instead of redownloading from Maven Central every time.
      - backend-m2:/root/.m2
    working_dir: /app
    # spring-boot-devtools (already a pom.xml dependency) auto-restarts the app
    # in-JVM whenever target/classes changes. Maven itself doesn't recompile on
    # save, so after editing a .java file run, in another terminal:
    #   docker-compose exec backend ./mvnw compile -o
    # (fast - dependencies are already cached). An IDE that auto-compiles into
    # target/classes on save (e.g. IntelliJ's Maven-based build) triggers the
    # same restart without that manual step.
    entrypoint: ["sh", "-c", "chmod +x mvnw && ./mvnw spring-boot:run"]

  frontend:
    build:
      # Stop at the stage with `npm ci` + `prisma generate` + `npm run build`
      # already done, instead of the production standalone runner image.
      target: builder
    volumes:
      - ../a2bsoftware-frontend:/app
      # Named volumes: Docker won't auto-populate a volume mounted under an
      # already-bind-mounted host path, so node_modules/.next need their own
      # persistent volumes - kept across restarts, reinstalled below only when
      # actually empty.
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8081}
      WATCHPACK_POLLING: "true"
      # .env.local's DATABASE_URL points at `localhost:3306`, which inside this
      # container is itself, not the native MySQL on the host - override with
      # host.docker.internal like the backend service already does below.
      DATABASE_URL: mysql://${DB_USERNAME:-root}:${DB_PASSWORD:-root}@host.docker.internal:${DB_PORT:-3306}/${DB_NAME:-a2b_dashboard}
    # node_modules lives in a fresh, empty named volume on first run - install
    # into it once, then every later start (same volume) skips straight to dev.
    command: ["sh", "-c", "[ -x node_modules/.bin/next ] || (npm ci && npx prisma generate); npm run dev"]

volumes:
  backend-m2:
  frontend-node-modules:
  frontend-next-cache:
