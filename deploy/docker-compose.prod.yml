# Production stack for a2bsoftware-frontend. Lives on the VPS at
# ${DEPLOY_PATH} (see deploy/scripts/server-setup.sh) and is driven entirely
# by deploy/scripts/deploy.sh over SSH - nobody should need to hand-type
# `docker compose` commands here except during manual recovery (see
# docs/DEPLOYMENT.md "Manual deploy without CI/CD").
#
# nginx on this box is HOST-native, not a container: it already fronts the
# Spring Boot API (127.0.0.1:8081) from the sibling a2bsoftware-backend
# stack on the same shared vhost (dashboard.a2bsoftware.com) - that repo
# owns the vhost file itself (see its deploy/nginx/dashboard.a2bsoftware.com.conf),
# this repo only owns state/upstream.conf, which that file `include`s. This
# compose file's only job is to publish the frontend on two loopback ports
# nginx can reach. Keycloak lives on its own separate domain
# (auth.a2bsoftware.com), not part of this shared vhost at all.
#
# Zero-downtime model: app_blue (127.0.0.1:3000) and app_green
# (127.0.0.1:3001) are the SAME image on two slots. A deploy starts the new
# version on whichever slot is idle, health-checks it directly over its
# published port (bypassing nginx), and only then rewrites
# state/upstream.conf and hot-reloads the host's nginx (`nginx -s reload`,
# which drains existing connections instead of dropping them) to cut
# traffic over. The old slot is stopped only after cutover succeeds - so a
# bad build never takes the site down, and rollback is just "point
# upstream.conf back at the other slot and reload."
#
# Required in the .env file next to this compose file (generated by
# deploy/scripts/write-env.sh from GitHub Secrets/Variables - never commit a
# real one): IMAGE_REF, ZAMP_KEY, EXIT_HMAC_KEY, NEXT_PUBLIC_API_BASE_URL,
# NEXT_PUBLIC_BACKEND_URL, LOG_LEVEL

services:
  app_blue:
    image: ${IMAGE_REF:?IMAGE_REF must be set in .env}
    container_name: a2bsoftware-frontend-blue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      # Loopback-only: reachable from this host's nginx, never from outside
      # (no firewall rule needed for these - they're not on a public
      # interface at all).
      - "127.0.0.1:3000:3000"
    networks:
      - app_net
    extra_hosts:
      # NEXT_PUBLIC_BACKEND_URL (used server-side by next.config.ts's
      # rewrites for the legacy, non-migrated routes) needs to reach the
      # Spring Boot API from INSIDE this container - 127.0.0.1 in here is
      # this container itself, not the host, so host.docker.internal is
      # what actually resolves to the host's 127.0.0.1:8081 (same pattern
      # already used by the dev docker-compose.yml). Not needed for
      # NEXT_PUBLIC_API_BASE_URL, which the browser calls directly.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app_green:
    image: ${IMAGE_REF:?IMAGE_REF must be set in .env}
    container_name: a2bsoftware-frontend-green
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - app_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app_net:
    driver: bridge
